services:

  postgres:
    image: postgres:16-alpine
    container_name: ev_charging_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ev_charging}
      POSTGRES_USER: ${POSTGRES_USER:-ev_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ev_user} -d ${POSTGRES_DB:-ev_charging}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ev_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ev_charging_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ev_charging}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ev_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ev_password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_LIQUIBASE_ENABLED: "true"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    ports:
      - "8081:8080"
    networks:
      - ev_network

volumes:
  postgres_data:
    name: ev_charging_postgres_data

networks:
  ev_network:
    name: ev_charging_network
    driver: bridge