# Development compose — runs only PostgreSQL.
# Use this when running the Spring Boot app locally via IDE or mvn spring-boot:run.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d

services:

  postgres:
    image: postgres:16-alpine
    container_name: ev_charging_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ev_charging
      POSTGRES_USER: ev_user
      POSTGRES_PASSWORD: ev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ev_user -d ev_charging"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
    name: ev_charging_postgres_dev_data
